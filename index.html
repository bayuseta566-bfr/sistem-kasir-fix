<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Modern</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="topbar">
        <h2>Kasir d’Browns</h2>
    </div>

    <div class="main">

        <!-- KIRI (PESANAN) -->
        <div class="order-panel">

            <h3>Pesanan</h3>

            <ul id="list"></ul>

            <div class="payment">
                <input type="text" id="nama" placeholder="Nama Pelanggan">
                <input type="number" id="uang" placeholder="Uang">
                <input type="text" id="kembalian" placeholder="Kembalian" readonly>

                <h2>Total: Rp <span id="total">0</span></h2>

                <button class="btn-selesai" onclick="selesai()">Selesai</button>
            </div>

        </div>

        <!-- KANAN (MENU) -->
        <div class="menu-panel">

            <div class="menu-grid">

                <div class="card" onclick="tambah('Brown Ice',10000)">
                    <img src="browns.png">
                    <p>Brown Ice</p>
                    <span>Rp 10.000</span>
                </div>

                <div class="card" onclick="tambah('Mocachino',12000)">
                    <img src="mochacino.png">
                    <p>Mocachino</p>
                    <span>Rp 12.000</span>
                </div>

                <div class="card" onclick="tambah('Matcha Latte',12000)">
                    <img src="matcha.png">
                    <p>Matcha Latte</p>
                    <span>Rp 12.000</span>
                </div>

                <div class="card" onclick="tambah('Oreo',12000)">
                    <img src="oreo.png">
                    <p>Oreo</p>
                    <span>Rp 12.000</span>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
