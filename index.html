<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Modern</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>d’Browns POS</h1>
    </div>

    <div class="main">

        <!-- PESANAN -->
        <div class="order-panel">
            <h2>Pesanan</h2>
            <ul id="list"></ul>

            <div class="total-box">
                <h3>Total: Rp <span id="total">0</span></h3>
            </div>

            <input type="text" id="nama" placeholder="Nama Pelanggan">
            <input type="number" id="uang" placeholder="Uang">

            <input type="text" id="kembalian" placeholder="Kembalian" readonly>

            <button class="btn-selesai" onclick="selesai()">Selesai</button>
        </div>

        <!-- MENU -->
        <div class="menu-panel">

            <div class="menu-grid">

                <div class="card" onclick="tambah('Brown Ice',10000)">
                    <img src="img/brown.jpg">
                    <p>Brown Ice</p>
                    <span>Rp 10.000</span>
                </div>

                <div class="card" onclick="tambah('Mocachino',12000)">
                    <img src="img/mocachino.jpg">
                    <p>Mocachino</p>
                    <span>Rp 12.000</span>
                </div>

                <div class="card" onclick="tambah('Matcha Latte',12000)">
                    <img src="img/matcha.jpg">
                    <p>Matcha</p>
                    <span>Rp 12.000</span>
                </div>

                <div class="card" onclick="tambah('Oreo',12000)">
                    <img src="img/oreo.jpg">
                    <p>Oreo</p>
                    <span>Rp 12.000</span>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
