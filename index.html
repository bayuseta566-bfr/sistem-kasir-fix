<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir POS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- PANEL PESANAN -->
    <div class="order-panel">
        <div class="order-header">
            <h2>Pesanan</h2>
            <input type="text" id="namaPelanggan" placeholder="Nama Pelanggan">
        </div>

        <div class="order-list" id="list"></div>

        <div class="total-box">
            <div>Total: Rp <span id="total">0</span></div>
            <input type="number" id="uang" placeholder="Uang pelanggan">
            <input type="text" id="kembalian" placeholder="Kembalian" readonly>
            <button class="finish-btn" onclick="selesai()">Selesai</button>
        </div>
    </div>

    <!-- PANEL MENU -->
    <div class="menu-panel">

        <div class="menu-header">
            <h2>Menu Produk</h2>
        </div>

        <div class="menu-grid">

            <div class="menu-card" onclick="tambah('Brown Ice',10000)">
                <img src="browns.png">
                <p>Brown Ice</p>
                <span>10.000</span>
            </div>

            <div class="menu-card" onclick="tambah('Mocachino',12000)">
                <img src="mochacino.png">
                <p>Mocachino</p>
                <span>12.000</span>
            </div>

            <div class="menu-card" onclick="tambah('Matcha Latte',12000)">
                <img src="matcha.png">
                <p>Matcha Latte</p>
                <span>12.000</span>
            </div>

            <div class="menu-card" onclick="tambah('Oreo',12000)">
                <img src="oreo.png">
                <p>Oreo</p>
                <span>12.000</span>
            </div>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
